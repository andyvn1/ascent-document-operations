services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ascent
      - POSTGRES_PASSWORD=ascent
      - POSTGRES_DB=ascent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascent"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql+psycopg://ascent:ascent@db:5432/ascent
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    command: uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: